<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>우리 동네 안전·기록 디지털 지도</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="title-wrap">
        <h1>우리 동네 탐험대</h1>
        <p>안전하고 살기 좋은 고장 만들기</p>
        <div class="standards">
          <p>
            [4사01-02] 주변의 여러 장소를 살펴보고, 우리가 사는 곳을 더 살기 좋은 곳으로 만드는
            방안을 탐색한다.
          </p>
          <p>
            [4체05-01] 일상생활에서 발생할 수 있는 안전사고의 종류와 원인을 파악하여 예방 및 대처
            방법을 익힌다.
          </p>
        </div>
      </div>
      <div class="filter-wrap" id="filterWrap" aria-label="카테고리 필터"></div>
      <div class="top-actions">
        <button type="button" id="myLocationBtn" class="btn">내 위치 보기</button>
        <button type="button" id="exportCsvBtn" class="btn">CSV 내보내기</button>
        <button type="button" id="exportImageBtn" class="btn">이미지 내보내기</button>
        <button type="button" id="exportPdfBtn" class="btn">PDF 다운로드</button>
        <button type="button" id="toggleDashboardBtn" class="btn">대시보드</button>
      </div>
    </header>

    <main>
      <section id="map" aria-label="우리 동네 지도"></section>

      <aside class="legend" aria-label="지도 범례">
        <h2>범례</h2>
        <ul>
          <li><span class="dot pride"></span> 살기 좋은 곳</li>
          <li><span class="dot safety"></span> 주의할 곳</li>
          <li><span class="dot help"></span> 도움받는 곳</li>
        </ul>
      </aside>

      <aside class="dashboard hidden" id="dashboardPanel" aria-label="교사용 통계 대시보드">
        <h2>교사용 통계</h2>
        <p id="totalCount">전체 기록 0개</p>
        <div id="statsList" class="stats-list"></div>
      </aside>

      <section class="form-panel hidden" id="entryPanel" aria-live="polite">
        <h2 id="formTitle">장소 기록하기</h2>
        <form id="entryForm">
          <input id="entryId" name="entryId" type="hidden" />
          <label for="placeName">장소 이름</label>
          <input id="placeName" name="placeName" type="text" maxlength="40" required />

          <label for="category">카테고리</label>
          <select id="category" name="category" required>
            <option value="pride">🍏 살기 좋은 곳</option>
            <option value="safety">⚠️ 주의할 곳</option>
            <option value="help">🏥 도움받는 곳</option>
          </select>

          <label for="note">특징 / 우리가 해야 할 일</label>
          <textarea
            id="note"
            name="note"
            rows="3"
            maxlength="140"
            placeholder="예: 여기선 무단횡단을 하면 안 돼요!"
          ></textarea>

          <div class="actions">
            <button type="submit" class="btn primary" id="submitBtn">저장</button>
            <button type="button" id="cancelBtn" class="btn">취소</button>
          </div>
        </form>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
